name: Net CLI
on: [push]

jobs:
    build:
        runs-on: windows-latest
        steps:
          - uses: actions/checkout@v7
          
          - name: Setup .Net
            uses: actions/setup-dotnet@v6
            with:
              dotnet-version: 10.x
              workloads: maui-windows
              cache: true
              cache-dependency-path: |
                MauiApp1/packages.lock.json
                TestProject1/packages.lock.json


          - name: Display version
            run: dotnet --version

          - name: Build Project
            run: dotnet build MauiApp1/MauiApp1.csproj -f net10.0-windows10.0.19041.0 -c Release

          - name: Test Project
            run: dotnet test TestProject1/TestProject1.csproj