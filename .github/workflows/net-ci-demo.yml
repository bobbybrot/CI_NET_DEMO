name: Net CLI
on: [push]

jobs:
    build:
        runs-on: [self-hosted, Windows, X64]
        steps:
          - uses: actions/checkout@v7
          
          - name: Setup dotnet
            uses: actions/setup-dotnet@v5
            with:
              dotnet-version: '10.x'
              workloads: maui-windows # We are not building for Android / iOS, so don't need to download the entire Maui SDK!
              # Cache properties.  If doing repeat CI operation, within 7 days, Github Server will reuse cache of NET packages to speed up process.
              cache: true
              cache-dependency-path: |
                MauiApp1/packages.lock.json
                TestProject1/packages.lock.json

          - name: Display version
            run: dotnet --version

          - name: Build Project
            run: dotnet build MauiApp1/MauiApp1.csproj -f net10.0-windows10.0.19041.0 -c Release

          - name: Test Project
            run: dotnet test TestProject1/TestProject1.csproj