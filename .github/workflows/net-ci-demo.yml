name: Net CLI
on: [push]

jobs:
    build:
        runs-on: windows-latest
        steps:
          - uses: actions/checkout@v7
          
          - name: Setup dotnet
            uses: actions/setup-dotnet@v5
            with:
              dotnet-version: '10.x'
              workloads: maui

          - name: Display version
            run: dotnet --version

          - name: Build Project
            run: dotnet build MauiApp1/MauiApp1.csproj -f net10.0-windows10.0.19041.0 -c Release